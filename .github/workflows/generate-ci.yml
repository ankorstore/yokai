name: "generate-ci"

on:
    push:
        branches:
            - "feat**"
            - "fix**"
            - "hotfix**"
            - "chore**"
        paths:
            - "generate/**.go"
            - "generate/go.mod"
            - "generate/go.sum"
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
        branches:
            - main
        paths:
            - "generate/**.go"
            - "generate/go.mod"
            - "generate/go.sum"

jobs:
    ci:
        uses: ./.github/workflows/common-ci.yml
        secrets: inherit
        with:
            module: "generate"
            go_version: "1.24"
            linter_version: "1.64.8"
